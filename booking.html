<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Book a phone repair service online with KJM Phone Services in Kira Town. Screen, battery, and software troubleshooting slots.">
  <title>Book a Repair | KJM Phone Services</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <nav>
      <div class="logo">
        <img src="images/logo5.png" alt="KJM Phone Services">
      </div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="testimonials.html">Testimonials</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="booking.html" class="active nav-btn">Book Repair</a></li>
      </ul>
      <button type="button" id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
    </nav>
  </header>

  <main>
    <!-- Elegant Minimal Form Header -->
    <section class="booking-hero-section" style="text-align: center; max-width: 600px; margin: 2rem auto 3rem;">
      <span class="hero-badge">Secure Diagnostics Slot</span>
      <h1 style="font-size: 3rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 1rem;">Book Your Repair Slot</h1>
      <p style="color: var(--text-muted); font-size: 1.15rem;">Schedule an upfront hardware check at our Kira Roundabout desk. No diagnostic deposit needed.</p>
    </section>
    
    <!-- Polished Form Container Layout -->
    <form action="https://formspree.io/f/mjgzlvzl" method="POST">
      
      <!-- Safe Redirect Callback Route -->
      <input type="hidden" name="_next" value="https://netlify.app">

      <div class="form-group">
          <label for="name">Your Full Name</label>
          <input type="text" id="name" name="name" placeholder="John Doe" required>
      </div>
      
      <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="john@example.com" required>
      </div>

      <div class="form-group">
          <label for="phone">WhatsApp / Contact Number</label>
          <input type="tel" id="phone" name="phone" placeholder="e.g. 0707230876" required>
      </div>

      <div class="form-group">
          <label for="device">Device Brand & Specific Model</label>
          <input type="text" id="device" name="device_model" placeholder="e.g. iPhone 13 Pro, Samsung Galaxy S23" required>
      </div>

      <div class="form-group">
          <label for="service">Required Technical Service</label>
          <select id="service" name="service_type" required>
              <option value="" disabled selected>Select service category</option>
              <option value="Screen Replacement">Screen Replacement (From 20k)</option>
              <option value="Battery Replacement">Battery Replacement (From 30k)</option>
              <option value="Software Services">Software Services (From 10k)</option>
              <option value="Water Damage Repair">Water Damage Repair (From 30k)</option>
              <option value="Professional Diagnostics">Professional Diagnostics (From 10k)</option>
          </select>
      </div>

      <div class="form-group">
          <label for="date">Preferred Workshop Date</label>
          <input type="date" id="date" name="appointment_date" required>
      </div>

      <div class="form-group">
        <label for="message">Describe the Fault Profile (Optional)</label>
        <textarea id="message" name="issue_description" rows="4" placeholder="Tell our technicians about touch anomalies, liquid exposure, or power symptoms..."></textarea>
      </div>

      <button type="submit" style="margin-top: 1rem;">Confirm Secure Booking</button>
    </form>
  </main>

  <footer>
    <p>&copy; 2026 KJM Phone Services. All rights reserved.</p>
  </footer>

  <a href="https://wa.me" target="_blank" class="sticky-whatsapp" title="Chat on WhatsApp" rel="noopener">
    💬
  </a>

  <script src="js/script.js"></script>
  
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('status') === 'success') {
        alert("🎉 Slot Reserved! Thank you for choosing KJM Phone Services. Our technical team will review your hardware submission notes and confirm via WhatsApp shortly.");
        window.history.replaceState({}, document.title, window.location.pathname);
    }
  </script>
</body>
</html>
