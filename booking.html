<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book a Repair - JK Phone Services</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <nav>
      <div class="logo">
        <img src="images/logo.svg" alt="JK Phone Services Logo">
      </div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="testimonials.html">Testimonials</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="booking.html">Booking</a></li>
      </ul>
      <button id="theme-toggle">🌙</button>
    </nav>
  </header>

  <main>
    <h1>Book a Repair</h1>
    <p>Schedule your phone repair appointment online. We'll get you fixed up in no time!</p>
    
    

    <form action="https://formspree.io/f/mjgzavlk" method="POST">
    <input type="hidden" name="_next" value="https://github.io">
  
    
    <!-- Redirects customer back to home page with a success signal -->


    <!-- Your Existing Booking Fields -->
    <div class="form-group">
        <label for="device">Device Type</label>
        <select id="device" name="Device Type" required>
            <option value="Android">Android</option>
            <option value="iPhone">iPhone</option>
            <option value="Other">Other</option>
        </select>
    </div>

    <div class="form-group">
        <label for="issue">Describe the Issue:</label>
        <textarea id="issue" name="Issue Description" placeholder="water" required></textarea>
    </div>

    <div class="form-group">
        <label for="date">Preferred Date:</label>
        <input type="date" id="date" name="Preferred Date" required>
    </div>

    <div class="form-group">
        <label for="time">Preferred Time:</label>
        <input type="time" id="time" name="Preferred Time" required>
    </div>

    <button type="submit" class="btn-booking">Book Appointment</button>
</form>
  </main>

  <footer>
    <p>&copy; 2026 JK Phone Services. All rights reserved.</p>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
